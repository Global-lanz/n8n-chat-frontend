<div class="auth-screen">
  <div class="auth-container">

    <!-- Logo -->
    <div class="auth-logo">
      @if (appLogo$ | async; as logo) {
        <img [src]="logo" alt="Logo" class="logo-img">
      } @else {
        <div class="logo-icon-wrap">💬</div>
      }
      <h1>{{ botName$ | async }}</h1>
      <p class="auth-subtitle">Faça login para continuar</p>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Email -->
      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        <input
          type="email"
          formControlName="email"
          placeholder="Seu email"
          autocomplete="email"
          [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        >
      </div>

      <!-- Password -->
      <div class="input-group">
        <span class="input-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Sua senha"
          autocomplete="current-password"
        >
        <button type="button" class="eye-toggle" (click)="showPassword = !showPassword" tabindex="-1">
          @if (showPassword) {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          } @else {
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          }
        </button>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || (loading$ | async)">
        @if (loading$ | async) {
          <span class="spinner"></span> Entrando...
        } @else {
          Entrar
        }
      </button>
    </form>

    @if (error$ | async; as error) {
      <div class="error-message">{{ error }}</div>
    }

    <div class="auth-version">v{{ version }}</div>
  </div>
</div>
