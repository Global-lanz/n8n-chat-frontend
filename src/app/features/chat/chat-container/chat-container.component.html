<div class="chat-screen">
  <!-- Chat Header -->
  <div class="chat-info">
    <div class="bot-avatar-wrap">
      @if (appLogo$ | async; as logo) {
        <img [src]="logo" alt="Logo" class="bot-avatar bot-avatar-logo">
      } @else {
        <div class="bot-avatar">🤖</div>
      }
      <div class="status-dot"></div>
    </div>
    <div class="bot-details">
      <div class="bot-name">{{ botName$ | async }}</div>
      <div class="bot-status">● Online</div>
    </div>
  </div>

  <!-- Messages -->
  <app-message-list
    [messages]="messages$ | async"
    [botName]="botName$ | async"
  ></app-message-list>

  <!-- Input -->
  <app-message-input
    (sendMessage)="onSendMessage($event)"
  ></app-message-input>
</div>
