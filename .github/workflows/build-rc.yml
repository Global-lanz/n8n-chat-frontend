name: Build RC

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: build-rc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-rc:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'RC')
    env:
      IMAGE_NAME: maiconlanzendorf/n8n-chat-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Normalize repository owner
        id: repo_owner
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Set GHCR image
        run: echo "GHCR_IMAGE=ghcr.io/${{ steps.repo_owner.outputs.owner }}/n8n-chat-frontend" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build:prod

      - name: Generate RC version
        id: rc_version
        run: |
          DATE=$(date +'%Y%m%d')
          COUNT=$(git ls-remote --tags origin "refs/tags/RC.${DATE}.*" | wc -l)
          COUNT=$(printf "%03d" $((COUNT + 1)))
          echo "rc_version=RC.${DATE}.${COUNT}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push RC image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.rc_version.outputs.rc_version }}
            ${{ env.GHCR_IMAGE }}:${{ steps.rc_version.outputs.rc_version }}
          build-args: |
            VERSION=${{ steps.rc_version.outputs.rc_version }}

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.rc_version.outputs.rc_version }}
          git push origin ${{ steps.rc_version.outputs.rc_version }}

      - name: Comment RC on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            🚀 RC published:

            Docker Hub:
            `${{ env.IMAGE_NAME }}:${{ steps.rc_version.outputs.rc_version }}`

            GHCR:
            `${{ env.GHCR_IMAGE }}:${{ steps.rc_version.outputs.rc_version }}`
